{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow-lg">

<div class="card-body p-5">

<h2 class="text-center mb-4">

<i class="bi bi-person-plus-fill"></i>

Register

</h2>

<form method="POST">

<div class="mb-3">

<label>Nama</label>

<input
type="text"
name="name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-4">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<button
class="btn btn-success w-100">

Register

</button>

</form>

<hr>

<p class="text-center">

Sudah punya akun?

<a href="/login">

Login

</a>

</p>

</div>

</div>

</div>

</div>

{% endblock %}
