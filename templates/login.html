{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg">

            <div class="card-body p-5">

                <h2 class="text-center mb-4">

                    <i class="bi bi-person-circle"></i>

                    Login

                </h2>

                <form method="POST">

                    <div class="mb-3">

                        <label>Email</label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-4">

                        <label>Password</label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>

                    </div>

                    <button
                        class="btn btn-primary w-100">

                        Login

                    </button>

                </form>

                <hr>

                <p class="text-center">

                    Belum punya akun?

                    <a href="/register">

                        Register

                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
